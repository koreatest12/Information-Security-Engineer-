name: Control-M Repository Sync & Security Build

# [권한 설정] 리포지토리에 코드를 쓰고 릴리즈를 올리기 위해 필수
permissions:
  contents: write
  packages: write

on:
  schedule:
    - cron: '*/30 * * * *' # 충돌 방지를 위해 30분 간격 권장
  push:
    branches: [ "main" ]
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  repo_sync_pipeline:
    name: 💾 리포지토리 동기화 및 보안 빌드
    runs-on: ubuntu-latest
    
    steps:
      # ========================================================
      # [Phase 0] 인프라 최적화 및 에러 방어
      # ========================================================
      - name: 🚦 [Control-M] Job Started
        run: |
          echo "=========================================="
          echo "   TARGET: koreatest12 / Information-Security"
          echo "   RUN ID: ${{ github.run_id }}"
          echo "=========================================="

      - name: 💾 [Infra] 디스크 청소 및 안전한 스왑 증설
        run: |
          echo "🧹 불필요 패키지 삭제 중..."
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          
          echo "💾 스왑 상태 점검..."
          if swapon --show | grep -q "/swapfile"; then
            echo "ℹ️ 이미 스왑이 활성화되어 있습니다. 건너뜁니다."
          else
            if [ -f /swapfile ]; then sudo swapoff /swapfile || true; fi
            sudo fallocate -l 4G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            echo "✅ 4GB 스왑 증설 완료."
          fi

      # ========================================================
      # [Phase 1] 환경 설정
      # ========================================================
      - name: 📥 소스 코드 로드
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔍 프로젝트 상태 감지
        id: check
        run: |
          FOUND_PATH=$(find . -type f -name "pubspec.yaml" | head -n 1)
          if [ -z "$FOUND_PATH" ]; then
            echo "NEED_GENERATION=true" >> $GITHUB_ENV
            echo "MODE=Auto-Gen" >> $GITHUB_ENV
          else
            echo "NEED_GENERATION=false" >> $GITHUB_ENV
            echo "FLUTTER_PROJECT_PATH=$(dirname "$FOUND_PATH")" >> $GITHUB_ENV
            echo "MODE=Existing" >> $GITHUB_ENV
          fi

      - name: 🐦 Flutter & Java Setup
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          cache: true

      # ========================================================
      # [Phase 2] 보안 강화 프로젝트 생성 (Clean Architecture 적용)
      # ========================================================
      - name: 🛠️ 엔터프라이즈 보안 구조 생성
        if: env.NEED_GENERATION == 'true'
        run: |
          PROJECT_NAME="korea_sec_app"
          flutter create $PROJECT_NAME
          cd $PROJECT_NAME
          
          # 보안 관련 패키지 대량 추가
          flutter pub add flutter_secure_storage dio provider get_it sqflite path crypto encrypt flutter_dotenv
          
          # 폴더 구조화
          mkdir -p lib/core/{security,network,database}
          
          # [보안 1] SQL 인젝션 방지
          cat > lib/core/database/db_security_patch.dart <<EOF
          class DBSecurityPatch {
            static String sanitize(String input) => input.replaceAll(RegExp(r"[<>;'\"--]"), '');
          }
          EOF

          # [보안 2] 데이터 암호화 (AES-256)
          cat > lib/core/security/encryption_service.dart <<EOF
          import 'package:encrypt/encrypt.dart';
          class EncryptionService {
            static final key = Key.fromUtf8('my_ultra_secure_key_32_characters_'); // 실제 운영시는 env 처리 권장
            static final iv = IV.fromLength(16);
            static final encrypter = Encrypter(AES(key));
            static String encrypt(String t) => encrypter.encrypt(t, iv: iv).base64;
          }
          EOF

          echo "FLUTTER_PROJECT_PATH=$GITHUB_WORKSPACE/$PROJECT_NAME" >> $GITHUB_ENV

      # ========================================================
      # [Phase 3] Git 동기화 (충돌 방지 로직)
      # ========================================================
      - name: 📤 [Git] 리포지토리 강제 동기화
        if: env.NEED_GENERATION == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull origin main --rebase
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "🛡️ [Control-M] Security Hardening v${{ github.run_number }}"
            git push origin main
          fi

      # ========================================================
      # [Phase 4] 빌드 및 릴리즈
      # ========================================================
      - name: 🏗️ 보안 난독화 APK 빌드
        run: |
          cd ${{ env.FLUTTER_PROJECT_PATH }}
          flutter build apk --release \
            --obfuscate --split-debug-info=build/app/outputs/symbols \
            --build-number=${{ github.run_number }}
          mv build/app/outputs/flutter-apk/app-release.apk "korea-sec-v${{ github.run_number }}.apk"

      - name: 🚀 [Release] APK 업로드
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "Security Release v${{ github.run_number }}"
          files: ${{ env.FLUTTER_PROJECT_PATH }}/korea-sec-v${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 최종 리포트
        if: always()
        run: |
          echo "### 🔐 Control-M 보안 빌드 리포트" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 상태 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 빌드 모드 | ${{ env.MODE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 보안 패치 | AES-256, SQL Sanitizer 적용 |" >> $GITHUB_STEP_SUMMARY
          echo "| 인프라 | Swap 4GB 활성화 |" >> $GITHUB_STEP_SUMMARY
